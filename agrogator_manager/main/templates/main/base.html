{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}АГРОГАТОР - Панель управления{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'main/assets/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Хедер -->
   <header class="header">
    <div class="container header__container">
        <div class="logo">
            <a href="{% url 'main' %}" class="logo-link">
                <i class="fas fa-tractor"></i>
                <span>АГРОГАТОР</span>
            </a>
        </div>
        <nav class="nav">
            <a href="{% url 'main' %}" class="nav-link active"><i class="fas fa-home"></i> Дашборд</a>
            <a href="#" class="nav-link"><i class="fas fa-handshake"></i> Сделки</a>
            <a href="#" class="nav-link"><i class="fas fa-users"></i> Участники</a>
            <a href="#" class="nav-link"><i class="fas fa-chart-bar"></i> Аналитика</a>
        </nav>
        <div class="user-profile">
            <div class="notification-bell">
                <i class="fas fa-bell"></i>
                <span class="notification-count">3</span>
            </div>
            <div class="user-info">
                <span class="user-name" id="headerUserName">Менеджер Иванов</span>
                <span class="user-role" id="headerUserRole">Администратор</span>
            </div>
            <div class="user-avatar" id="userAvatar">
                <img src="https://i.pravatar.cc/40?img=12" alt="Профиль">
                <div class="user-dropdown" id="userDropdown">
                    <div class="dropdown-item">
                        <i class="fas fa-user"></i>
                        <span>Личный кабинет</span>
                    </div>
                    <div class="dropdown-item">
                        <i class="fas fa-cog"></i>
                        <span>Настройки</span>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item logout-item" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Выйти</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

    <!-- Основной контент -->
    <main class="main">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'server/js/total_post.js' %}"></script>
    <script src="{% static 'main/assets/js/scripts_new.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
